<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
  <!-- Llama ears poking above window -->
  <path d="M5.8 4.5 L4.3 1.2 L7.2 3.8Z" fill="#5ec4d4"/>
  <path d="M10.2 4.5 L11.7 1.2 L8.8 3.8Z" fill="#5ec4d4"/>
  <!-- Llama head curve connecting ears -->
  <path d="M5.8 4.5 C5.8 2.8 10.2 2.8 10.2 4.5" fill="#5ec4d4"/>

  <!-- Window frame -->
  <rect x="1" y="4.5" width="14" height="10.5" rx="1.5" stroke="#5ec4d4" stroke-width="1.3"/>
  <!-- Title bar separator -->
  <line x1="1" y1="7.5" x2="15" y2="7.5" stroke="#5ec4d4" stroke-width="0.8"/>
  <!-- 3 title bar dots -->
  <circle cx="3.2" cy="6" r="0.65" fill="#5ec4d4"/>
  <circle cx="5.2" cy="6" r="0.65" fill="#5ec4d4"/>
  <circle cx="7.2" cy="6" r="0.65" fill="#5ec4d4"/>

  <!-- Code brackets </> inside window -->
  <path d="M4.2 9.8 L2.7 11.5 L4.2 13.2" stroke="#5ec4d4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M11.8 9.8 L13.3 11.5 L11.8 13.2" stroke="#5ec4d4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="9" y1="9.3" x2="7" y2="13.7" stroke="#5ec4d4" stroke-width="0.9" stroke-linecap="round"/>
</svg>